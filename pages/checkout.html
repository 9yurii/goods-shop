<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제하기 | 굿즈샵</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <!-- 토스페이먼츠 결제위젯 SDK -->
  <script src="https://js.tosspayments.com/v1/payment-widget"></script>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main>
    <h2>주문/결제</h2>
    <div id="checkout-error" class="form-error"></div>

    <div id="checkout-summary" class="checkout-summary">
      <p>상품 정보를 불러오는 중...</p>
    </div>

    <div id="pay-area" style="display:none;">
      <div id="payment-method"></div>
      <div id="agreement"></div>
      <button id="payment-button" class="btn btn-primary btn-block" style="margin-top:20px;" disabled>
        결제하기
      </button>
    </div>
  </main>

  <script type="module" src="../js/checkout.js"></script>
</body>
</html>
