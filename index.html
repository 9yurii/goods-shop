<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>굿즈샵 | 잔재미코딩 굿즈 스토어</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <section class="hero">
    <div class="hero-inner">
      <span class="hero-badge">토스페이먼츠 테스트 모드 · 실제 청구 없음</span>
      <h1 class="hero-title">코딩하는 사람을 위한<br /><em>작은 굿즈들</em></h1>

      <div class="hero-actions">
        <a class="btn btn-primary" href="#products">굿즈 구경하기</a>

    </div>

  <main>
    <section id="products">
      <div class="section-head">
        <h2>전체 상품</h2>
        <p class="page-sub">구매하기를 누르면 바로 결제 화면으로 넘어갑니다. (장바구니 없이 단품 구매)</p>
      </div>
      <div id="product-grid" class="product-grid">
        <p class="empty-state">상품을 불러오는 중...</p>
      </div>
    </section>
  </main>

  <script type="module" src="./js/products.js"></script>
